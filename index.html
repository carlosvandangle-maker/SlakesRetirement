<!DOCTYPE html>
<html>

<head>
  <title>Stu's Retirement Countdown</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 40px;
      padding-top: 80px;
    }

    #bg-title {
      position: fixed;
      top: 10px;
      left: 15px;
      font-size: 4rem;
      color: rgba(0,0,0,0.08);
    }

    #moodEmoji {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 6rem;
    }

    .bounce {
      animation: bounce 0.5s infinite;
    }

    @keyframes bounce {
      50% { transform: translateY(-20px); }
    }

    .day-bar {
      width: 80%;
      height: 30px;
      background: #eee;
      margin: 10px auto 30px;
      border-radius: 20px;
      overflow: hidden;
    }

    .day-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, #4caf50, #8bc34a);
    }

    #totalFill {
      background: linear-gradient(to right, orange, gold);
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
    }

    td, th {
      border: 1px solid #ccc;
      padding: 8px 12px;
    }

    /* CONFETTI */
    #celebration {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

    .confetti {
      position: absolute;
      font-size: 2rem;
      animation: fall 2s linear forwards;
    }

    @keyframes fall {
      0% { transform: translateY(-50px); }
      100% { transform: translateY(100vh); }
    }

    /* 🖕 FINGER */
    #fingerContainer {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 260px;
      text-align: center;
    }

    #fingerEmoji {
      font-size: 4rem;
      transition: transform 0.3s ease;
    }

  </style>
</head>

<body>

<div id="bg-title">Stu's Retirement</div>
<div id="moodEmoji">😩</div>
<div id="celebration"></div>

<h1 id="countdown"></h1>

<label>Leave Days: </label>
<input type="number" id="leaveInput" value="15">

<h3>🟢 Today's Work Progress (9:00–17:00)</h3>
<div id="dayPercentText"></div>
<div class="day-bar"><div id="dayFill" class="day-fill"></div></div>

<h3>🟠 Career Progress</h3>
<div id="totalDaysText"></div>
<div class="day-bar"><div id="totalFill" class="day-fill"></div></div>

<table>
<tr><th>Metric</th><th>Value</th></tr>
<tr><td>Working Days</td><td id="workdays"></td></tr>
<tr><td>Working Hours</td><td id="workhours"></td></tr>
<tr><td>Mercury Days</td><td id="mercuryDays"></td></tr>
<tr><td>Births</td><td id="births"></td></tr>
<tr><td>Deaths</td><td id="deaths"></td></tr>
<tr><td>Future Paydays</td><td id="paydays"></td></tr>
<tr><td>Paychecks Stolen</td><td id="earnedPay"></td></tr>
<tr><td>Bin Days</td><td id="bins"></td></tr>
<tr><td>Moon Cycles</td><td id="moon"></td></tr>
<tr><td>Movies</td><td id="movies"></td></tr>
<tr><td>EastEnders</td><td id="ee"></td></tr>
</table>

<!-- 🖕 FINGER -->
<div id="fingerContainer">
  <div id="fingerEmoji">✊</div>
  <div id="fingerText"></div>
  <div class="day-bar">
    <div class="day-fill" id="fingerFill"></div>
  </div>
</div>

<script>
const targetDate = new Date("2026-07-28T16:30:00");
const startDate = new Date("2002-04-01");

setInterval(update,1000);
update();

function update(){
  const now = new Date();
  const diff = targetDate - now;

  const d = Math.floor(diff/86400000);
  const h = Math.floor(diff/3600000 % 24);
  const m = Math.floor(diff/60000 % 60);
  const s = Math.floor(diff/1000 % 60);

  countdown.innerText = `${d}d ${pad(h)}:${pad(m)}:${pad(s)}`;

  // DAY %
  const start = new Date(now); start.setHours(9,0,0,0);
  const end = new Date(now); end.setHours(17,0,0,0);

  const percent = Math.min(Math.max((now-start)/(end-start),0),1)*100;

  dayFill.style.width = percent+"%";
  dayPercentText.innerText = percent.toFixed(1)+"% of today";

  moodEmoji.innerText = percent<25?"😩":percent<50?"😐":percent<75?"😊":"🤩";

  // TOTAL
  const totalPercent = ((now-startDate)/(targetDate-startDate))*100;
  totalFill.style.width = totalPercent+"%";
  totalDaysText.innerText = `${d} days remaining | ${totalPercent.toFixed(1)}%`;

  // WORK DAYS
  let wd=0, t=new Date(now);
  while(t<targetDate){
    t.setDate(t.getDate()+1);
    if(t.getDay()>0 && t.getDay()<6) wd++;
  }
  wd -= Number(leaveInput.value||0);
  workdays.innerText=wd;
  workhours.innerText=wd*7;

  // METRICS
  mercuryDays.innerText=(diff/(176*86400000)).toFixed(3);
  births.innerText=Math.floor(d*1800);
  deaths.innerText=Math.floor(d*1700);

  // PAYDAYS (FIXED)
  let payCount = 0;
  let temp = new Date(now.getFullYear(), now.getMonth(), 28);

  if(now > temp) temp.setMonth(temp.getMonth()+1);

  while(temp <= targetDate){
    payCount++;
    temp.setMonth(temp.getMonth()+1);
  }

  paydays.innerText = payCount;

  // PAYCHECKS
  let earnedCount=(now.getFullYear()-startDate.getFullYear())*12 +
                  (now.getMonth()-startDate.getMonth());
  if(now.getDate()<28) earnedCount--;
  earnedPay.innerText=Math.max(0,earnedCount);

  // BIN DAYS
  let binCount=0, b=new Date(startDate);
  while(b<targetDate){
    if(b>now) binCount++;
    b.setDate(b.getDate()+14);
  }
  bins.innerText=binCount;

  moon.innerText=Math.floor(diff/(29.53*86400000));
  movies.innerText=Math.floor(diff/(2*3600000));

  // EASTENDERS (FIXED)
  let eeCount=0, ed=new Date(now);
  while(ed<targetDate){
    ed.setDate(ed.getDate()+1);
    if(ed.getDay()>=1 && ed.getDay()<=4) eeCount++;
  }
  document.getElementById("ee").innerText=eeCount;

  // 🎉 CONFETTI
  const morning = now.getHours()==9 && now.getMinutes()<5;
  const evening = now.getHours()==16 && now.getMinutes()>=50;

  if(morning || evening) triggerConfetti();

  // 🖕 FINGER
  const fingerStart = new Date("2026-02-28");

  let fp = ((now - fingerStart)/(targetDate - fingerStart))*100;
  fp = Math.max(0,Math.min(100,fp));

  fingerFill.style.width = fp+"%";
  fingerText.innerText = fp.toFixed(1)+"% to freedom";

  const frames=["✊","🤛","🖐","🖕"];
  const idx=Math.floor((fp/100)*(frames.length-1));
  fingerEmoji.innerText=frames[idx];
  fingerEmoji.style.transform=`rotate(${(fp-50)/10}deg) scale(${1+fp/300})`;
}

function triggerConfetti(){
  const c=document.getElementById("celebration");
  for(let i=0;i<15;i++){
    let el=document.createElement("div");
    el.className="confetti";
    el.innerText=["🎉","✨","🎊"][Math.floor(Math.random()*3)];
    el.style.left=Math.random()*100+"%";
    c.appendChild(el);
    setTimeout(()=>el.remove(),2000);
  }
}

function pad(n){return n.toString().padStart(2,'0');}
</script>

</body>
</html>
